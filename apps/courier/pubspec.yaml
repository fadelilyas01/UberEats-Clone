name: courier
description: FoodFlow Pro Courier Application
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & Architecture
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # Network
  dio: ^5.4.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  cloud_firestore: ^4.15.8
  firebase_core: ^2.27.0

  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.1.1
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
